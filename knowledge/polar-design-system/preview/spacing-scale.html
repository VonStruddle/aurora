<!DOCTYPE html>
<!-- @dsCard group="Spacing" name="Spacing scale" subtitle="4 → 80px step" viewport="700x260" -->
<html lang="en"><head><meta charset="utf-8"><title>Spacing scale</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:#0D0D11;color:#fff;font-family:var(--font-sans);padding:24px;}
  .row{display:flex;align-items:center;gap:14px;padding:6px 0;font-size:12px;}
  .bar{height:10px;background:linear-gradient(90deg,#5433FB,#776EF8);border-radius:3px;}
  .lbl{width:60px;color:#8C8A98;font-family:var(--font-mono);font-size:11px;}
  .tok{width:70px;font-weight:500;}
</style></head><body>
  <div class="row"><span class="tok">--space-1</span><span class="lbl">4px</span><div class="bar" style="width:4px"></div></div>
  <div class="row"><span class="tok">--space-2</span><span class="lbl">8px</span><div class="bar" style="width:8px"></div></div>
  <div class="row"><span class="tok">--space-3</span><span class="lbl">12px</span><div class="bar" style="width:12px"></div></div>
  <div class="row"><span class="tok">--space-4</span><span class="lbl">16px</span><div class="bar" style="width:16px"></div></div>
  <div class="row"><span class="tok">--space-5</span><span class="lbl">24px</span><div class="bar" style="width:24px"></div></div>
  <div class="row"><span class="tok">--space-6</span><span class="lbl">32px</span><div class="bar" style="width:32px"></div></div>
  <div class="row"><span class="tok">--space-7</span><span class="lbl">48px</span><div class="bar" style="width:48px"></div></div>
  <div class="row"><span class="tok">--space-8</span><span class="lbl">64px</span><div class="bar" style="width:64px"></div></div>
  <div class="row"><span class="tok">--space-9</span><span class="lbl">80px</span><div class="bar" style="width:80px"></div></div>
</body></html>
