<!DOCTYPE html>
<!-- @dsCard group="Colors" name="Color · Text ramp" subtitle="110 / 100 / 90 / 80 on light" viewport="700x240" -->
<html lang="en"><head><meta charset="utf-8"><title>Text ramp</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:#F0F9FF;color:#303051;font-family:'Aeonik','Inter',sans-serif;padding:22px;}
  h4{font-size:10px;text-transform:uppercase;letter-spacing:0.12em;color:#6C6C9C;font-weight:500;margin:0 0 12px;}
  .row{display:flex;align-items:center;gap:16px;padding:6px 0;border-bottom:1px solid #EAE9FF;}
  .row:last-child{border-bottom:0;}
  .sw{width:36px;height:36px;border-radius:8px;border:1px solid #EAE9FF;}
  .n{width:60px;font-weight:500;font-size:12px;}
  .hex{font-family:ui-monospace,Menlo,monospace;font-size:11px;color:#6C6C9C;width:80px;}
  .sample{font-size:15px;}
</style></head><body>
  <h4>Text ramp (light) — role labels</h4>
  <div class="row"><div class="sw" style="background:#303051"></div><span class="n">110</span><span class="hex">303051</span><span class="sample" style="color:#303051">Primary text — headlines & body</span></div>
  <div class="row"><div class="sw" style="background:#4B4B7E"></div><span class="n">100</span><span class="hex">4B4B7E</span><span class="sample" style="color:#4B4B7E">Supporting</span></div>
  <div class="row"><div class="sw" style="background:#6C6C9C"></div><span class="n">90</span><span class="hex">6C6C9C</span><span class="sample" style="color:#6C6C9C">Secondary / captions</span></div>
  <div class="row"><div class="sw" style="background:#999FC8"></div><span class="n">80</span><span class="hex">999FC8</span><span class="sample" style="color:#999FC8">Placeholder / disabled</span></div>
</body></html>
