<!DOCTYPE html>
<!-- @dsCard group="Colors" name="Color · Indigo scale" subtitle="Primary indigo 100–900; 400 is the CTA" viewport="700x180" -->
<html lang="en"><head><meta charset="utf-8"><title>Color — Primary Indigo</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:var(--anthracite-900);color:#fff;font-family:var(--font-sans);}
  .wrap{padding:20px;}
  .row{display:grid;grid-template-columns:repeat(9,1fr);gap:8px;}
  .sw{aspect-ratio:1/1;border-radius:10px;display:flex;flex-direction:column;justify-content:flex-end;padding:8px;font-size:10px;line-height:1.2;border:1px solid rgba(255,255,255,0.06);}
  .sw .hex{opacity:0.7;font-family:var(--font-mono);font-size:9px;}
  .sw .name{font-weight:500;}
</style></head><body><div class="wrap">
  <div class="row">
    <div class="sw" style="background:#EAE9FF;color:#221E72"><span class="name">100</span><span class="hex">#EAE9FF</span></div>
    <div class="sw" style="background:#B9B5FF;color:#221E72"><span class="name">200</span><span class="hex">#B9B5FF</span></div>
    <div class="sw" style="background:#776EF8;color:#fff"><span class="name">300</span><span class="hex">#776EF8</span></div>
    <div class="sw" style="background:#5433FB;color:#fff"><span class="name">400 ★</span><span class="hex">#5433FB</span></div>
    <div class="sw" style="background:#5A50FE;color:#fff"><span class="name">500</span><span class="hex">#5A50FE</span></div>
    <div class="sw" style="background:#4337FE;color:#fff"><span class="name">600</span><span class="hex">#4337FE</span></div>
    <div class="sw" style="background:#3B33C5;color:#fff"><span class="name">700</span><span class="hex">#3B33C5</span></div>
    <div class="sw" style="background:#2F299C;color:#fff"><span class="name">800</span><span class="hex">#2F299C</span></div>
    <div class="sw" style="background:#221E72;color:#fff"><span class="name">900</span><span class="hex">#221E72</span></div>
  </div>
</div></body></html>
