<!DOCTYPE html>
<!-- @dsCard group="Colors" name="Color · Surfaces" subtitle="Dark and light canvas + card" viewport="700x240" -->
<html lang="en"><head><meta charset="utf-8"><title>Color — Surfaces</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;color:#fff;font-family:var(--font-sans);font-size:12px;}
  .grid{display:grid;grid-template-columns:1fr 1fr;min-height:220px;}
  .pane{padding:20px;display:flex;flex-direction:column;justify-content:space-between;}
  .dark{background:#0D0D11;}
  .light{background:#F0F9FF;color:#303051;}
  .card{border-radius:14px;padding:16px;border:1px solid;}
  .dark .card{background:#16161C;border-color:#3B3B54;}
  .light .card{background:#FAFBFE;border-color:#EAE9FF;}
  .lbl{text-transform:uppercase;letter-spacing:0.12em;font-size:10px;font-weight:500;opacity:0.7;}
  .val{font-family:var(--font-mono);font-size:11px;opacity:0.75;margin-top:4px;}
  h4{margin:0 0 10px;font-weight:500;font-size:14px;}
</style></head><body>
  <div class="grid">
    <div class="pane dark">
      <div>
        <span class="lbl">Dark · hero</span>
        <h4>Canvas #0D0D11</h4>
      </div>
      <div class="card">
        <span class="lbl">Surface</span>
        <div style="font-size:14px;margin-top:2px">Anthracite 800</div>
        <div class="val">#16161C · border #3B3B54</div>
      </div>
    </div>
    <div class="pane light">
      <div>
        <span class="lbl">Light</span>
        <h4>Canvas #F0F9FF</h4>
      </div>
      <div class="card">
        <span class="lbl">Surface</span>
        <div style="font-size:14px;margin-top:2px">BG Light 10</div>
        <div class="val">#FAFBFE · border #EAE9FF</div>
      </div>
    </div>
  </div>
</body></html>
