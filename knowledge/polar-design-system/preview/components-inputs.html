<!DOCTYPE html>
<!-- @dsCard group="Components" name="Inputs & fields" subtitle="Default, focus, error, search" viewport="700x220" -->
<html lang="en"><head><meta charset="utf-8"><title>Inputs & fields</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:#0D0D11;color:#fff;font-family:var(--font-sans);padding:24px;}
  .grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;max-width:640px;}
  .field{display:flex;flex-direction:column;gap:6px;}
  label{font-size:12px;color:#8C8A98;text-transform:uppercase;letter-spacing:0.1em;font-weight:500;}
  input,select{background:#16161C;border:1px solid #3B3B54;color:#fff;padding:11px 14px;border-radius:10px;font-family:inherit;font-size:14px;outline:none;transition:border-color 150ms ease-out;}
  input:focus,select:focus{border-color:#776EF8;}
  .error{border-color:#F92572;}
  .err-msg{color:#F92572;font-size:11px;}
  .search{position:relative;}
  .search input{padding-left:36px;}
  .search::before{content:"⌕";position:absolute;left:12px;top:50%;transform:translateY(-50%);color:#8C8A98;}
</style></head><body>
  <div class="grid">
    <div class="field"><label>Work email</label><input value="nora@acmebrand.com"></div>
    <div class="field"><label>GMV range</label><select><option>$1M – $5M</option></select></div>
    <div class="field"><label>Personal email</label><input class="error" value="nora@gmail.com"><span class="err-msg">Business email required</span></div>
    <div class="field"><label>Search</label><div class="search"><input placeholder="Search all of Polar"></div></div>
  </div>
</body></html>
