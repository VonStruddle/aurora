<!DOCTYPE html>
<!-- @dsCard group="Spacing" name="Radii" subtitle="4 / 6 / 8 / 12 / 16 / 20" viewport="700x180" -->
<html lang="en"><head><meta charset="utf-8"><title>Radii</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:#0D0D11;color:#fff;font-family:var(--font-sans);padding:24px;}
  .grid{display:grid;grid-template-columns:repeat(6,1fr);gap:14px;}
  .sw{aspect-ratio:1/1;background:#16161C;border:1px solid #3B3B54;display:flex;flex-direction:column;justify-content:flex-end;padding:10px;font-size:11px;}
  .sw .px{color:#8C8A98;font-family:var(--font-mono);font-size:10px;}
  .name{font-weight:500;}
</style></head><body>
  <div class="grid">
    <div class="sw" style="border-radius:4px"><span class="name">4</span><span class="px">0.25rem</span></div>
    <div class="sw" style="border-radius:6px"><span class="name">6</span><span class="px">0.375rem</span></div>
    <div class="sw" style="border-radius:8px"><span class="name">8</span><span class="px">0.5rem</span></div>
    <div class="sw" style="border-radius:12px"><span class="name">12</span><span class="px">0.75rem</span></div>
    <div class="sw" style="border-radius:16px"><span class="name">16</span><span class="px">1rem</span></div>
    <div class="sw" style="border-radius:20px"><span class="name">20</span><span class="px">1.25rem</span></div>
  </div>
</body></html>
