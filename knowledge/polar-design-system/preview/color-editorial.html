<!DOCTYPE html>
<!-- @dsCard group="Colors" name="Color · Editorial accents" subtitle="Anis · Pineapple · Lilas · Lagoon · Granit" viewport="700x160" -->
<html lang="en"><head><meta charset="utf-8"><title>Editorial accents</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:#0D0D11;color:#fff;font-family:'Aeonik','Inter',sans-serif;padding:22px;}
  .grid{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;}
  .sw{border-radius:12px;padding:14px;display:flex;flex-direction:column;gap:6px;min-height:78px;justify-content:space-between;}
  .name{font-size:12px;font-weight:500;}
  .hex{font-family:ui-monospace,Menlo,monospace;font-size:10px;opacity:0.8;}
  .lbl{font-size:10px;text-transform:uppercase;letter-spacing:0.12em;opacity:0.7;margin-bottom:8px;}
  h4{font-size:10px;text-transform:uppercase;letter-spacing:0.12em;color:#8C8A98;font-weight:500;margin:0 0 10px;}
</style></head><body>
  <h4>Editorial accent families · headline + background + border</h4>
  <div class="grid">
    <div class="sw" style="background:rgba(134,236,200,0.2);border:1px solid rgba(134,236,200,0.4);color:#B1FFD1"><span class="lbl" style="color:#82E2C8">Anis</span><div><div class="name">#B1FFD1</div><div class="hex">/ bg 20% / 04AB7D</div></div></div>
    <div class="sw" style="background:rgba(226,223,130,0.1);border:1px solid rgba(226,223,130,0.3);color:#FFFB7B"><span class="lbl" style="color:#E2DF82">Pineapple</span><div><div class="name">#FFFB7B</div><div class="hex">/ bg 10% / E2DF82</div></div></div>
    <div class="sw" style="background:rgba(205,91,223,0.1);border:1px solid rgba(205,91,223,0.3);color:#F6BFFF"><span class="lbl" style="color:#CD5BDF">Lilas</span><div><div class="name">#F6BFFF</div><div class="hex">/ bg 10% / BF1AD9</div></div></div>
    <div class="sw" style="background:rgba(91,186,223,0.1);border:1px solid rgba(91,186,223,0.3);color:#A4E3FB"><span class="lbl" style="color:#5BBADF">Lagoon</span><div><div class="name">#A4E3FB</div><div class="hex">/ bg 10% / 5BBADF</div></div></div>
    <div class="sw" style="background:rgba(140,138,152,0.1);border:1px solid rgba(140,138,152,0.3);color:#B3B1BF"><span class="lbl" style="color:#8C8A98">Granit</span><div><div class="name">#B3B1BF</div><div class="hex">/ bg 10% / 8C8A98</div></div></div>
  </div>
</body></html>
