<!DOCTYPE html>
<!-- @dsCard group="Colors" name="Color · Viz palette" subtitle="Chart series — indigo primary" viewport="700x180" -->
<html lang="en"><head><meta charset="utf-8"><title>Viz palette</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:#0D0D11;color:#fff;font-family:'Aeonik','Inter',sans-serif;padding:22px;}
  h4{font-size:10px;text-transform:uppercase;letter-spacing:0.12em;color:#8C8A98;font-weight:500;margin:0 0 12px;}
  .grid{display:grid;grid-template-columns:repeat(7,1fr);gap:8px;}
  .sw{aspect-ratio:1/1;border-radius:10px;display:flex;flex-direction:column;justify-content:flex-end;padding:10px;font-size:11px;}
  .n{font-weight:500;}
  .h{font-family:ui-monospace,Menlo,monospace;opacity:0.85;font-size:10px;}
</style></head><body>
  <h4>Viz palette — chart series (use indigo first)</h4>
  <div class="grid">
    <div class="sw" style="background:#5A50FE;color:#fff"><span class="n">Indigo</span><span class="h">5A50FE</span></div>
    <div class="sw" style="background:#00BC84;color:#0D0D11"><span class="n">Green</span><span class="h">00BC84</span></div>
    <div class="sw" style="background:#F92572;color:#fff"><span class="n">Red</span><span class="h">F92572</span></div>
    <div class="sw" style="background:#F87700;color:#fff"><span class="n">Orange</span><span class="h">F87700</span></div>
    <div class="sw" style="background:#F4C620;color:#0D0D11"><span class="n">Yellow</span><span class="h">F4C620</span></div>
    <div class="sw" style="background:#3F9FF8;color:#fff"><span class="n">Blue</span><span class="h">3F9FF8</span></div>
    <div class="sw" style="background:#F038F3;color:#fff"><span class="n">Magenta</span><span class="h">F038F3</span></div>
  </div>
</body></html>
