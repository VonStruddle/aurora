<!DOCTYPE html>
<!-- @dsCard group="Colors" name="Color · Primary ramp" subtitle="10–110; 100 is light-mode CTA" viewport="700x160" -->
<html lang="en"><head><meta charset="utf-8"><title>Primary ramp</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:#0D0D11;color:#fff;font-family:'Aeonik','Inter',sans-serif;padding:22px;}
  h4{font-size:10px;text-transform:uppercase;letter-spacing:0.12em;color:#8C8A98;font-weight:500;margin:0 0 10px;}
  .ramp{display:grid;grid-template-columns:repeat(11,1fr);gap:4px;}
  .step{aspect-ratio:1/1.1;border-radius:8px;display:flex;flex-direction:column;justify-content:flex-end;padding:8px;font-size:10px;}
  .n{font-weight:500;}
  .h{font-family:ui-monospace,Menlo,monospace;opacity:0.8;font-size:9px;}
</style></head><body>
  <h4>Primary — 10 through 110 (CTAs, links, focus)</h4>
  <div class="ramp">
    <div class="step" style="background:#EFEDFF;color:#303051"><span class="n">10</span><span class="h">EFEDFF</span></div>
    <div class="step" style="background:#DEDCFF;color:#303051"><span class="n">20</span><span class="h">DEDCFF</span></div>
    <div class="step" style="background:#CECBFF;color:#303051"><span class="n">30</span><span class="h">CECBFF</span></div>
    <div class="step" style="background:#BDB9FF;color:#303051"><span class="n">40</span><span class="h">BDB9FF</span></div>
    <div class="step" style="background:#ACA7FF;color:#303051"><span class="n">50</span><span class="h">ACA7FF</span></div>
    <div class="step" style="background:#9C96FE;color:#fff"><span class="n">60</span><span class="h">9C96FE</span></div>
    <div class="step" style="background:#8B85FE;color:#fff"><span class="n">70</span><span class="h">8B85FE</span></div>
    <div class="step" style="background:#7B73FE;color:#fff"><span class="n">80</span><span class="h">7B73FE</span></div>
    <div class="step" style="background:#6B62FE;color:#fff"><span class="n">90</span><span class="h">6B62FE</span></div>
    <div class="step" style="background:#5A50FE;color:#fff;outline:2px solid #B1FFD1"><span class="n">100</span><span class="h">5A50FE</span></div>
    <div class="step" style="background:#4337FE;color:#fff"><span class="n">110</span><span class="h">4337FE</span></div>
  </div>
</body></html>
