<!DOCTYPE html>
<!-- @dsCard group="Brand" name="Nav + lockup" subtitle="One-word Polar lockup in navigation" viewport="700x160" -->
<html lang="en"><head><meta charset="utf-8"><title>Nav & Lockup</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:#0D0D11;color:#fff;font-family:var(--font-sans);}
  .nav{display:flex;align-items:center;padding:18px 24px;gap:28px;border-bottom:1px solid #3B3B54;}
  .lockup{display:flex;align-items:center;gap:10px;font-weight:700;font-size:20px;letter-spacing:-0.02em;}
  .sym{width:32px;height:32px;border-radius:8px;}
  .links{display:flex;gap:22px;color:#8C8A98;font-size:14px;font-weight:500;margin-left:auto;}
  .links a{color:inherit;text-decoration:none;}
  .links a:hover{color:#fff;}
  .cta{background:#5433FB;color:#fff;padding:9px 16px;border-radius:8px;font-size:13px;font-weight:500;text-decoration:none;}
  .proof{padding:18px 24px;display:flex;gap:16px;align-items:center;color:#8C8A98;font-size:12px;}
</style></head><body>
  <div class="nav">
    <div class="lockup"><img class="sym" src="../assets/logo-symbol.png" alt="">Polar</div>
    <div class="links"><a>Product</a><a>Solutions</a><a>Customers</a><a>Pricing</a><a class="cta" style="color:#fff">Book a demo</a></div>
  </div>
  <div class="proof"><span style="text-transform:uppercase;letter-spacing:0.12em;color:#776EF8;font-weight:500;font-size:11px">Rated 4.7 on Shopify App Store</span><span style="color:#B1FFD1">★★★★★</span></div>
</body></html>
