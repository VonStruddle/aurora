<!DOCTYPE html>
<!-- @dsCard group="Type" name="Type · Heldane accent" subtitle="One italic word OR one display numeral" viewport="700x240" -->
<html lang="en"><head><meta charset="utf-8"><title>Type — Heldane accent</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:#0D0D11;color:#fff;font-family:'Aeonik','Inter',-apple-system,sans-serif;}
  .wrap{padding:28px 32px;}
  .fam{color:#776EF8;font-size:10px;text-transform:uppercase;letter-spacing:0.12em;margin-bottom:14px;font-weight:500;}
  .headline{font-weight:700;font-size:44px;line-height:1.05;letter-spacing:-0.02em;max-width:700px;}
  .headline em{font-family:'Heldane Display',Georgia,serif;font-style:italic;font-weight:500;color:#B1FFD1;}
  .note{margin-top:14px;color:#8C8A98;font-size:12px;text-transform:uppercase;letter-spacing:0.12em;}
  .figure{margin-top:14px;font-family:'Heldane Display',Georgia,serif;font-style:italic;font-weight:500;font-size:88px;line-height:1;color:#B1FFD1;font-feature-settings:"tnum";}
</style></head><body><div class="wrap">
  <div class="fam">Heldane Display Italic · Serif accent</div>
  <div class="headline">Grow <em>resilient</em> brands on a strong data foundation.</div>
  <div style="display:flex;gap:28px;align-items:baseline;">
    <div class="figure">4.7</div>
    <div class="note" style="max-width:260px;">One Heldane italic word, or one display numeral — never body.</div>
  </div>
</div></body></html>
