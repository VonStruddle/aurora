<!DOCTYPE html>
<!-- @dsCard group="Colors" name="Color · Anthracite scale" subtitle="Neutral dark ramp; 900 is canvas" viewport="700x180" -->
<html lang="en"><head><meta charset="utf-8"><title>Color — Anthracite</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:var(--anthracite-900);color:#fff;font-family:var(--font-sans);}
  .wrap{padding:20px;}
  .row{display:grid;grid-template-columns:repeat(9,1fr);gap:8px;}
  .sw{aspect-ratio:1/1;border-radius:10px;display:flex;flex-direction:column;justify-content:flex-end;padding:8px;font-size:10px;line-height:1.2;border:1px solid rgba(255,255,255,0.06);}
  .sw .hex{opacity:0.7;font-family:var(--font-mono);font-size:9px;}
  .sw .name{font-weight:500;}
</style></head><body><div class="wrap">
  <div class="row">
    <div class="sw" style="background:#08080A;color:#fff"><span class="name">850</span><span class="hex">#08080A</span></div>
    <div class="sw" style="background:#0D0D11;color:#fff"><span class="name">900 ★</span><span class="hex">#0D0D11</span></div>
    <div class="sw" style="background:#16161C;color:#fff"><span class="name">800</span><span class="hex">#16161C</span></div>
    <div class="sw" style="background:#22222D;color:#fff"><span class="name">700</span><span class="hex">#22222D</span></div>
    <div class="sw" style="background:#252537;color:#fff"><span class="name">600</span><span class="hex">#252537</span></div>
    <div class="sw" style="background:#3B3B54;color:#fff"><span class="name">500</span><span class="hex">#3B3B54</span></div>
    <div class="sw" style="background:#55557D;color:#fff"><span class="name">400</span><span class="hex">#55557D</span></div>
    <div class="sw" style="background:#8C8A98;color:#0D0D11"><span class="name">300</span><span class="hex">#8C8A98</span></div>
    <div class="sw" style="background:#C3BFFF;color:#0D0D11"><span class="name">100</span><span class="hex">#C3BFFF</span></div>
  </div>
</div></body></html>
